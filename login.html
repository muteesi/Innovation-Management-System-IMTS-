
<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Login | Bank of Uganda Innovation Management System</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script src="tailwind-config.js"></script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
            background-color: #FEF7EF;
        }
        .login-card-shadow {
            box-shadow: 0 10px 25px -5px rgba(90, 12, 8, 0.08), 0 8px 10px -6px rgba(90, 12, 8, 0.04);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Animated Atmospheric Subtle Light -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-brand-gold blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-brand-maroon blur-[120px] rounded-full"></div>
</div>
<!-- Main Login Content -->
<main class="flex-grow flex items-center justify-center w-full px-4 z-10">
<div class="w-full max-w-[440px] bg-brand-soft-yellow rounded-sm overflow-hidden login-card-shadow relative">
<!-- Gold Accent Line -->
<div class="h-1.5 w-full bg-brand-gold"></div>
<div class="p-lg md:p-xl flex flex-col items-center">
<!-- Brand Logo -->
<div class="mb-md">
<img alt="Bank of Uganda Logo" class="w-24 h-24 object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAF9nCu4tiQ0ZAr2R4w1WL2RaELBGyZj94Wi0zLuSiUxJWVefrkPA4lMd9ISUw-Pw9ixlroRXpTRvodSr-pnIpD_KmhQ40rbkGSdYUB9vR3rZF6gG27HK6LuoaQ-6uvEYDPmflnU1B_yywZFOseL2njJWjwN1luB1JP9I16KRHhA_zBqDAdW8y6_xXoTU4mXlCwZ-ELVhvTMoDCXXQKqorWx6k9soyH1AGAimHdMSqqTz1MhWvCcg-KzB-0CdjHk9Fu795_ags21_LSL9U">
</div>
<!-- Page Header -->
<div class="text-center mb-lg">
<h1 class="text-brand-maroon font-headline-md text-headline-md leading-tight">
                        Innovation Management System
                    </h1>
<p class="text-on-surface-variant font-body-md text-body-md mt-2">
                        Portal Secure Access
                    </p>
</div>
<!-- Login Form -->
<form action="#" class="w-full space-y-md" method="POST">
<!-- Username Field -->
<div class="flex flex-col gap-1.5">
<label class="text-on-surface font-label-md text-label-md" for="username">Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant focus:border-brand-gold focus:ring-1 focus:ring-brand-gold rounded-sm transition-all duration-200 outline-none font-body-md text-body-md" id="username" name="username" placeholder="Enter your username" required="" type="text">
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1.5">
<label class="text-on-surface font-label-md text-label-md" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-10 pr-10 py-3 bg-surface-container-lowest border border-outline-variant focus:border-brand-gold focus:ring-1 focus:ring-brand-gold rounded-sm transition-all duration-200 outline-none font-body-md text-body-md" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-brand-maroon" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
<div class="flex justify-end mt-1">
<a class="text-brand-gold font-label-md text-label-md hover:underline decoration-2 transition-all" href="#">
                                Forgot Password?
                            </a>
</div>
</div>
<!-- Login Button -->
<div class="pt-sm">
<button class="w-full bg-brand-gold hover:bg-[#c47e1d] text-white font-label-md text-label-md py-4 rounded-sm shadow-sm transition-all active:scale-[0.98] uppercase tracking-wider" type="submit">
                            Login
                        </button>
</div>
<!-- Additional Help -->
<div class="text-center pt-md border-t border-brand-maroon/5 mt-lg">
<p class="text-on-surface-variant font-label-sm text-label-sm">
                            Need help accessing the portal? 
                            <a class="text-brand-maroon font-bold hover:underline" href="#">Contact IT Support</a>
</p>
</div>
</form>
</div>
</div>
</main>
<!-- Footer Component -->
<footer class="fixed bottom-0 left-0 w-full py-md px-margin flex flex-col md:flex-row justify-between items-center gap-sm bg-surface-container-low border-t border-outline-variant z-20">
<div class="flex flex-col md:flex-row items-center gap-base">
<span class="text-label-md font-label-md font-bold text-on-surface">BOU IMS</span>
<span class="hidden md:block text-outline-variant">|</span>
<p class="text-label-sm font-label-sm text-on-surface-variant">© Bank of Uganda, All Rights Reserved</p>
</div>
<nav class="flex items-center gap-lg">
<a class="text-label-sm font-label-sm text-on-surface-variant hover:text-brand-maroon transition-colors focus:underline decoration-2" href="#">Privacy Policy</a>
<a class="text-label-sm font-label-sm text-on-surface-variant hover:text-brand-maroon transition-colors focus:underline decoration-2" href="#">Terms of Service</a>
<a class="text-label-sm font-label-sm text-on-surface-variant hover:text-brand-maroon transition-colors focus:underline decoration-2" href="#">Security Standards</a>
<a class="text-label-sm font-label-sm text-on-surface-variant hover:text-brand-maroon transition-colors focus:underline decoration-2" href="#">Contact Support</a>
</nav>
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-outline text-[18px]">verified_user</span>
<span class="text-label-sm font-label-sm text-outline">Secure Environment</span>
</div>
</footer>
<script>
        // Simple Interaction logic
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="flex items-center justify-center gap-2"><svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Authenticating...</span>';
            btn.disabled = true;
            
            const usernameVal = (document.getElementById('username').value || '').toLowerCase();
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
                
                if (usernameVal.includes('admin') || usernameVal.includes('katumba')) {
                    window.location.href = 'itadmin/ITadmin.html';
                } else if (usernameVal.includes('staff') || usernameVal.includes('jonathan') || usernameVal.includes('john')) {
                    window.location.href = 'staffuser/staffdashboard.html';
                } else {
                    window.location.href = 'innovationteam/innovationteamdashboard.html';
                }
            }, 1000);
        });

        // Toggle Password visibility
        const togglePass = document.querySelector('button[type="button"]');
        const passInput = document.getElementById('password');
        togglePass.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            togglePass.querySelector('span').textContent = isPass ? 'visibility_off' : 'visibility';
        });
    </script>


</body></html>
